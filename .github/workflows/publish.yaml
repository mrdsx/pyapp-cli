name: Publish package

on:
  push:
    tags:
      - v*

jobs:
  publish:
    name: python
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.1"

      - name: Install Python
        run: uv python install
      
      - name: Build project
        run: uv build
      
      - name: Publish package
        run: uv publish